<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mensaje</title>

<style>
body{
  background:#0b0b0b;
  color:#d8f3dc;
  font-family:"Courier New", monospace;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:40px;
}

#text{
  max-width:750px;
  font-size:16px;
  line-height:1.6;
  white-space:pre-wrap;
}

.highlight{
  color:orange;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02),
    rgba(0,0,0,0.02) 2px
  );
  pointer-events:none;
}
</style>
</head>

<body>

<div id="text"></div>

<script>

const message = `Hola, Elizabeth.

Supongo que fue difícil, o tal vez fácil, o quién sabe si fastidioso...

Me demoré en hacerlo, pero valió la pena.

Me gustas.

No espero respuesta, solo quería decirlo.

att, Evan`;

let i = 0;
let buffer = "";

function type(){

  if(i >= message.length){
    render(buffer);
    return;
  }

  buffer += message[i];
  i++;

  render(buffer);

  const char = message[i-1];

  if(char === "."){
    setTimeout(type, 600);
  }
  else if(char === ","){
    setTimeout(type, 200);
  }
  else{
    setTimeout(type, 25);
  }
}

function render(text){

  const marker = "Me gustas.";

  const el = document.getElementById("text");

  if(text.includes(marker)){
    const parts = text.split(marker);

    el.innerHTML =
      parts[0] +
      `<div class="highlight">${marker}</div>` +
      (parts[1] || "");
  } else {
    el.textContent = text; // 👈 CLAVE (NO innerHTML)
  }
}

type();

</script>

</body>
</html>
