<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  color:#d8f3dc;
  font-family:"Courier New", monospace;
  padding:20px;
  min-height:100vh;
  overflow-x:hidden;
}

#text{
  max-width:650px;
  margin:auto;
  white-space:pre-wrap;
  word-wrap:break-word;
  font-size:24px;
  line-height:1.8;
  border-right:2px solid #d8f3dc;
}

.highlight{
  color:orange;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

/* efecto leve */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02),
    rgba(0,0,0,0.02) 2px
  );
  pointer-events:none;
}
</style>
</head>

<body>

<div id="text"></div>

<script>

const message = `Hola, Elizabeth.

Supongo que fue fácil, o tal vez difícil, o quién sabe si fastidioso...

La verdad, me demoré tres días haciendo esta decodificación porque tomó bastante tiempo, pero siento que valió la pena.

Me gustas.

No espero un sí ni un no; solo quería sacarme esta espina del corazón.

att, con todo el corazón, Evan`;

let i = 0;
let buffer = "";
let pauseLove = false;

const box = document.getElementById("text");

function type(){

  if(i >= message.length){
    render(buffer);
    return;
  }

  const char = message[i];
  buffer += char;
  i++;

  render(buffer);

  // 🔥 PAUSA ANTES DE "Me gustas."
  if(message.slice(i).startsWith("Me gustas.") && !pauseLove){
    pauseLove = true;
    setTimeout(type, 2000);
    return;
  }

  // ⌨️ velocidad según carácter
  let delay = 35;

  if(char === ".") delay = 900;
  else if(char === ",") delay = 250;

  // 📜 auto scroll SOLO al final (85%)
  if(i > message.length * 0.85){
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: "smooth"
    });
  }

  setTimeout(type, delay);
}

function render(text){

  const marker = "Me gustas.";

  if(text.includes(marker)){
    const parts = text.split(marker);

    box.innerHTML =
      parts[0] +
      `<div class="highlight">${marker}</div>` +
      (parts[1] || "");
  } else {
    box.textContent = text;
  }
}

window.onload = () => {
  type();
};

</script>

</body>
</html>
