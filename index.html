<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensaje</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:#d8f3dc;
    font-family:"Courier New", monospace;
    padding:18px;
    min-height:100vh;
    overflow-y:auto;
    position:relative;
    animation:flicker 6s infinite;
}

#text{
    width:100%;
    max-width:850px;
    margin:0 auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    font-size:23px;
    line-height:1.8;
    border-right:3px solid #d8f3dc;
    text-shadow:0 0 2px rgba(255,255,255,.2);
}

.highlight{
    color:orange;
    font-weight:bold;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,255,255,.02),
        rgba(0,0,0,.02) 2px
    );
    pointer-events:none;
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:.98;}
}

</style>

</head>

<body>

<div id="text"></div>

<script>

const message = `Hola, Elizabeth.

Supongo que fue fácil, o tal vez difícil, o quién sabe si fastidioso...

La verdad, me demoré tres días haciendo esta decodificación porque tomó bastante tiempo, pero siento que valió la pena.

Me gustas.

No espero un sí ni un no; solo quería sacarme esta espina del corazón.

att, con todo el corazón, Evan`;

const box = document.getElementById("text");

let i = 0;
let pause = false;

function escribir(){

    if(i >= message.length){
        return;
    }

    const siguiente = message.slice(i);

    if(siguiente.startsWith("Me gustas.") && !pause){

        pause = true;

        setTimeout(escribir,2000);

        return;

    }

    if(siguiente.startsWith("Me gustas.")){

        box.innerHTML += `<span class="highlight">Me gustas.</span>`;

        i += "Me gustas.".length;

        setTimeout(escribir,1000);

        return;

    }

    box.innerHTML += message.charAt(i);

    window.scrollTo(0,document.body.scrollHeight);

    const c = message.charAt(i);

    i++;

    if(c==="."){
        setTimeout(escribir,900);
    }
    else if(c===","){
        setTimeout(escribir,250);
    }
    else{
        setTimeout(escribir,40);
    }

}

window.onload=()=>{
    escribir();
}

</script>

</body>
</html>
